{{ define "main" }}
{{ $photo := resources.Get "img/profile_about.jpeg" }}
<article>
  <header class="mb-8">
    <h1 class="mt-5 text-4xl font-extrabold text-neutral-900 dark:text-neutral">{{ .Title }}</h1>
  </header>

  <div class="flex flex-col sm:flex-row gap-8 items-start">

    {{ if $photo }}
    <div class="not-prose sm:order-last flex-shrink-0 w-52 mx-auto sm:mx-0 sm:ms-2">
      <img
        class="rounded-2xl shadow-md w-full"
        loading="eager"
        src="{{ ($photo.Resize "416x").RelPermalink }}"
        alt="{{ .Site.Params.Author.name | default "About" }}"
      >
    </div>
    {{ end }}

    <section class="prose dark:prose-invert min-w-0 flex-1">
      {{ .Content }}
    </section>

  </div>
</article>
{{ end }}
