{{ define "main" }}
{{ $photo := resources.Get "img/profile_about.jpeg" }}
<article>
  {{ if $photo }}
  {{ $cropped := $photo.Fill "288x288 q96" }}
  <div class="flex flex-col items-center mb-8">
    <img
      class="h-36 w-36 rounded-full shadow-md mb-3"
      width="144" height="144"
      src="{{ $cropped.RelPermalink }}"
      alt="{{ .Site.Params.Author.name | default "About" }}"
    >
    <p class="text-xl font-bold text-neutral-900 dark:text-neutral">
      {{ .Site.Params.Author.name }}
    </p>
    <p class="text-sm text-neutral-500 dark:text-neutral-400">
      {{ .Site.Params.Author.headline }}
    </p>
  </div>
  {{ end }}

  <div class="prose dark:prose-invert max-w-full">
    {{ .Content }}
  </div>
</article>
{{ end }}
