theme = "blowfish"
baseURL = "https://carolinafaccin.github.io/"
defaultContentLanguage = "en"

enableRobotsTXT = true
enableEmoji = true
summaryLength = 30
buildDrafts = false
buildFuture = false

[pagination]
  pagerSize = 10

[imaging]
  anchor = "Center"

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5
